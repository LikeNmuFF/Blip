name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
        unzip -q tools.zip
        mv cmdline-tools latest
        export ANDROID_HOME=$HOME/android-sdk
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

    - name: Download Gradle
      run: |
        curl -sL https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
        unzip -q gradle.zip
        echo "$(pwd)/gradle-8.2/bin" >> $GITHUB_PATH

    - name: Build APK
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
        cat build.log

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ChatApp-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7

    - name: Upload Build Log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Log
        path: build.log
        retention-days: 3
