name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
        unzip -q tools.zip
        mv cmdline-tools latest
        export ANDROID_HOME=$HOME/android-sdk
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH" >> $GITHUB_ENV
        
        # Accept licenses and install required components
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        cat local.properties

    - name: Build APK
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build-output.log || true

    - name: List ALL build outputs
      run: |
        echo "=== Searching for APKs ==="
        find . -name "*.apk" -type f 2>/dev/null || echo "No APKs"
        echo "=== app/build contents ==="
        ls -la app/build/ 2>/dev/null || echo "No app/build"
        echo "=== app/build/outputs ==="
        find app/build -type f 2>/dev/null | head -30 || echo "Nothing"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ChatApp-Debug-APK
        path: |
          **/*.apk
          app/build/outputs/**/*.apk
        if-no-files-found: warn
        retention-days: 7

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Log
        path: build-output.log
        retention-days: 7
