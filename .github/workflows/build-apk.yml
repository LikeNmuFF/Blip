name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
        unzip -q tools.zip
        mv cmdline-tools latest
        export ANDROID_HOME=$HOME/android-sdk
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        cat local.properties

    - name: Build APK
      run: |
        chmod +x ./gradlew
        ./gradlew --version
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.log
        exit_code=$?
        echo "Build exit code: $exit_code"
        find . -name "*.apk" -type f 2>/dev/null
        exit $exit_code

    - name: Find and Upload APK
      if: always()
      run: |
        APK=$(find . -path "*/build/outputs/*" -name "*.apk" -type f | head -1)
        if [ -n "$APK" ]; then
          echo "Found APK: $APK"
          mkdir -p upload-dir
          cp "$APK" upload-dir/app-debug.apk
          echo "APK_READY=true" >> $GITHUB_ENV
        else
          echo "No APK found in build outputs"
        fi

    - name: Upload APK Artifact
      if: env.APK_READY == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ChatApp-Debug-APK
        path: upload-dir/app-debug.apk
        retention-days: 7

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Log
        path: build-output.log
        retention-days: 7
