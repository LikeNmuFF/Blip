name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk/cmdline-tools
        curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
        unzip -q tools.zip
        mv cmdline-tools latest
        export ANDROID_HOME=$HOME/android-sdk
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

    - name: Make Gradlew Executable
      run: chmod +x ./gradlew

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        cat local.properties

    - name: Build APK
      run: |
        ./gradlew --version
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.log || true

    - name: Find APK
      run: |
        find . -name "*.apk" -type f 2>/dev/null
        APK=$(find . -name "app-debug.apk" -type f 2>/dev/null | head -1)
        echo "FOUND_APK=$APK" >> $GITHUB_ENV

    - name: Upload APK
      if: env.FOUND_APK != ''
      uses: actions/upload-artifact@v4
      with:
        name: ChatApp-Debug-APK
        path: ${{ env.FOUND_APK }}
        retention-days: 7

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Log
        path: build-output.log
        retention-days: 7
