name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Gradle (since wrapper jar is missing)
      run: |
        curl -L https://services.gradle.org/distributions/gradle-8.2-bin.zip -o gradle.zip
        unzip -q gradle.zip
        mv gradle-8.2 gradle
        echo "GRADLE_HOME=$(pwd)/gradle" >> $GITHUB_ENV
        echo "$(pwd)/gradle/bin" >> $GITHUB_PATH

    - name: Build APK
      run: gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ChatApp-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
